<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="docente-panel">
        <h2>Panel Docente</h2>

        <!-- Cursos asignados -->
        <section class="docente-cursos">
            <h3>Mis Cursos</h3>
            <table class="tabla-cursos">
                <thead>
                    <tr>
                    <th>Curso</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaCursos">
                    <!-- Aquí se cargan los cursos del docente -->
                    <!-- Ejemplo dinámico:
                    <tr>
                    <td>Matemáticas</td>
                    <td>Álgebra básica</td>
                    <td><button class="btn-ver-estudiantes" data-curso="1">Ver estudiantes</button></td>
                    </tr>
                    -->
                </tbody>
            </table>
        </section>

        <!-- Estudiantes del curso seleccionado -->
        <section class="docente-estudiantes">
            <h3>Estudiantes del Curso</h3>
            <table class="tabla-estudiantes">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Promedio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listaEstudiantes">
                    
                </tbody>
            </table>
        </section>
        
    </div>

    <script src="script-docente.js"></script>
    
</body>
</html>
