<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="docente-page">
    <div class="docente-sidebar">
        <h2>🎓 Docentes</h2>
        <ul>
            <li><a href="#" class="docente-active">Inicio</a></li>
            <li><a href="#">Mis Cursos</a></li>
            <li><a href="#">Estudiantes</a></li>
        </ul>
    </div>

    <div class="docente-main">
        <header class="docente-header">
            <h2>Panel Docente</h2>
            <button id="docenteSalir">Salir</button>
        </header>

        <!-- Cursos asignados -->
        <section class="docente-cursos">
            <h3>Mis Cursos</h3>
            <table class="docente-tabla-cursos">
                <thead>
                    <tr>
                        <th>Curso</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaCursos">
                <!-- Cursos dinámicos -->
                </tbody>
            </table>
        </section>

        <!-- Estudiantes del curso seleccionado -->
        <section class="docente-estudiantes">
            <h3>Estudiantes del Curso</h3>
            <table class="docente-tabla-estudiantes">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Promedio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listaEstudiantes">
                <!-- Estudiantes dinámicos -->
            </table>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script-docente.js"></script>
    
</body>
</html>
