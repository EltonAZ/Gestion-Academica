
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Academico</title>
    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="styles.css">
    <!-- Librería de iconos Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<!-- Clase login-page para estilos a la pagina de login-->
<body class="login-page">
    <!-- Contenedor principal del formulario de login -->
    <div class="login-wrapper">
        <!-- Caja que contiene el formulario -->
        <div class="login-form">
            <h2>Ingreso al Sistema</h2>
            <!-- Formulario de login -->
            <form id="loginForm">
                <!-- Grupo de entrada para el correo -->
                <div class="input-group">
                    <label for="email">Correo:</label>
                    <!-- Icono de correo -->
                    <i class="fas fa-envelope"></i> 
                    <!-- Campo de texto para ingresar email -->
                    <input type="email" id="loginEmail" required>
                </div>
                
                <!-- Grupo de entrada para la contraseña -->
                <div class="input-group">
                    <label for="password">Contraseña:</label>
                    <!-- Icono de candado -->
                    <i class="fas fa-lock"></i>
                    <!-- Campo de texto para ingresar contraseña -->
                    <input type="password" id="loginPassword" required>
                </div>
                
                <!-- Botón para enviar el formulario -->
                <button type="submit">Ingresar</button>
            </form>

            <!-- Mensaje de error en caso de credenciales inválidas -->
            <p id="errorMsg"></p>
        </div>
        
        
    </div>

    <!-- Script JS que maneja la lógica del login -->
    <script src="script-login.js"></script>
   
</body>
</html>
