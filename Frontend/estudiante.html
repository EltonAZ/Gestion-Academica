<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiante</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="estudiante-container">
        <h2>Panel Estudiante</h2>

        <h3>Mis Notas</h3>
        <table id="tablaNotasEstudiante">
            <thead>
                <tr>
                    <th>Curso</th>
                    <th>Nota</th>
                </tr>
            </thead>
            <tbody>
                <!-- Espacio donde se mostrará las notas-->
            </tbody>
        </table>
    </div>
    

    <script>
        fetch("http://localhost:8080/estudiantes")
        .then(Response=> response.json())
        .then(data => {
            const tbody = document.querySelector("#tablaNotasEstudiante tbody");
            tbody.innerHTML = "";
            data.forEach(est => {
                const fila = `
                <tr>
                    <td>${est.id}</td>
                    <td>${est.nombre}</td>
                    <td>${est.apellido}</td>
                    <td>${est.email}</td>      
                </tr>
            `;
            tbody.innerHTML += fila;
            });
        })
        .catch(error => console.error("Error al cargar:", error));
    </script>

    <script src="script-estudiante.js"></script>
    
</body>
</html>
