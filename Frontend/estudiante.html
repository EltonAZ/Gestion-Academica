<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiante</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="estudiante-page">
    <!-- Barra lateral -->
    <div class="estudiante-sidebar">
        <h2>🎓 Estudiante</h2>
        <ul>
            <li><a href="#" class="estudiante-active">Inicio</a></li>
            <li><a href="#">Mis Cursos</a></li>
            <li><a href="#">Mis Notas</a></li>
        </ul>
    </div>

    <!-- Contenido principal -->
    <div class="estudiante-main">
        <header class="estudiante-header">
            <h2>Panel Estudiante</h2>
            <button id="estudianteSalir">Salir</button>
        </header>

        <!-- Cursos inscritos -->
        <section class="estudiante-cursos">
            <h3>Mis Cursos</h3>
            <table class="estudiante-tabla-cursos">
                <thead>
                    <tr>
                        <th>Curso</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaCursosEstudiante">
                <!-- Cursos dinámicos -->
                </tbody>
            </table>
        </section>

        <!-- Notas del curso seleccionado -->
        <section class="estudiante-notas">
            <h3>Mis Notas</h3>
            <table class="estudiante-tabla-notas">
                <thead>
                    <tr>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Promedio</th>
                    </tr>
                </thead>
                <tbody id="detalleNotas">
                <!-- Notas dinámicas -->
                </tbody>
            </table>
        </section>
    </div>        

    <script src="script-estudiante.js"></script>
    
    
</body>
</html>
