<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiante</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="estudiante-panel">
        <h2>Panel Estudiante</h2>

        <!-- Cursos inscritos -->
        <section class="estudiante-cursos">
            <h3>Mis cursos</h3>
            <table class="Tabla-cursos">
                <thead>
                    <tr>
                        <th>Curso</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaCursosEstudiante"></tbody>
                <!-- Aquí se cargan los cursos del estudiante -->
            </table>
        </section>

        <!-- Notas del curso seleccionado -->
        <section class="estudiante-notas">
            <h3>Mis Notas</h3>
            <table class="tabla-notas">
                <thead>
                    <tr>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Promedio</th>
                    </tr>
                </thead>
                <tbody id="detalleNotas">
                    <!-- Aquí se cargan las notas del curso -->
                </tbody>
            </table>
        </section>
    </div>

    <script src="script-estudiante.js"></script>
    
    
</body>
</html>
