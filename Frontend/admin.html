<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="admin-container">
        <h2>Panel del Administrador</h2>

    <!-- Sección de Estudiantes -->
        <section>
            <h3>Gestión de Estudiantes</h3>
            <form id="formEstudiante">
                <input type="text" id="nombreEstudiante" placeholder="Nombre" required>
                <input type="text" id="apellidoEstudiante" placeholder="Apellido" required>
                <input type="email" id="correoEstudiante" placeholder="Correo" required>
            <button type="submit">Registrar Estudiante</button>
            </form>
            <table id="tablaEstudiantes">
                <thead>
                    <tr>                               
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Correo</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Sección de Cursos -->
        <section>
            <h3>Gestión de Cursos</h3>
            <form id="formCurso">
                <input type="text" id="nombreCurso" placeholder="Nombre del curso" required>
                <input type="text" id="descripcionCurso" placeholder="Descripcion del Curso" required>
                <button type="submit">Registrar Curso</button>
            </form>
            <table id="tablaCursos">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripcion</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Sección de Docentes -->
        <section>
            <h3>Gestión de Docentes</h3>
            <form id="formDocente">
                <input type="text" id="nombreDocente" placeholder="Nombre del Docente" required>
                <input type="text" id="apellidoDocente" placeholder="Apellido del Docente" required>
                <input type="email" id="correoDocente" placeholder="Correo del Docente" required>
                <button type="submit">Registrar Docente</button>
            </form>
            <table id="tablaDocentes">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Correo</th>
                        <th>Curso Asignado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

    </div>
    
    <script src="script-admin.js"></script>
    
</body>
</html>
